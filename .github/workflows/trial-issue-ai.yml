name: Trial Issue AI Summary

on:
  issues:
    types: [opened]

jobs:
  trial-ai:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    if: contains(github.event.issue.title, '[trial]')

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract topic
        run: |
          echo "TOPIC<<EOF" >> $GITHUB_ENV
          echo "$TOPIC_INPUT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
        env:
          TOPIC_INPUT: ${{ github.event.issue.title }}

      - name: Search topic with Brave
        run: |
          ENCODED_TOPIC=$(printf %s "$TOPIC" | jq -sRr @uri)
          curl "https://api.search.brave.com/res/v1/web/search?q=${ENCODED_TOPIC}&freshness=pw" \
          -H "X-Subscription-Token: ${{ secrets.BRAVE_API_KEY }}" \
          > results.json

      - name: Show results
        run: cat results.json

      - name: Save results as text
        run: |
          echo "== Search results for: $TOPIC ==" > results.txt
          echo "" >> results.txt
          jq -r '.web.results[:4][] | "• \(.title)\n  \(.description)\n  \(.url)\n"' results.json >> results.txt

      - name: Commit results file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.txt
          git commit -m "Add search results" || echo "No changes to commit"
          git push
